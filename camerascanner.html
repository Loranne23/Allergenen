<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijn Allergenen Scanner</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
            background-color: #f9f9f9;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px 0;
            width: 100%;
        }
        .upload-btn { background-color: #28a745; }
        .crop-btn { background-color: #ffc107; color: #212529; display: none; }
        
        /* Cropper container styling */
        .img-container {
            max-width: 100%;
            max-height: 400px;
            margin-top: 15px;
            display: none;
        }
        img {
            max-width: 100%;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            font-weight: bold;
            display: none;
            text-align: left;
            white-space: pre-wrap;
        }
        .safe { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .danger { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .loading { background-color: #fff3cd; color: #856404; text-align: center; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
</head>
<body>

<div class="container">
    <h2>Allergenen Scanner</h2>
    <p>Maak een foto van de ingrediënten, snijd hem bij en scan direct.</p>
    
    <button type="button" class="upload-btn" onclick="document.getElementById('cameraInput').click()">📷 Open Camera / Neem Foto</button>
    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;">

    <div class="img-container">
        <img id="imageToCrop" src="">
    </div>
    
    <button type="button" id="cropButton" class="crop-btn">✂️ Selectie Uitsnijden & Scannen</button>
    
    <div id="result"></div>
</div>

<script>
    const cameraInput = document.getElementById('cameraInput');
    const imageToCrop = document.getElementById('imageToCrop');
    const cropButton = document.getElementById('cropButton');
    const resultDiv = document.getElementById('result');
    const imgContainer = document.querySelector('.img-container');
    
    let cropper;

    // Jouw specifieke allergenenprofiel
    const ALLERGENEN = [
        { naam: "Melk", trefwoorden: ["melk", "wei", "caseïn", "lactose", "boter", "room", "kaas", "melkpoeder", "curd", "milk", "whey", "butter"] },
        { naam: "Soja", trefwoorden: ["soja", "soy", "lecithine", "sojaboon", "soybean"] },
        { naam: "Avocado", trefwoorden: ["avocado"] },
        { naam: "Oregano", trefwoorden: ["oregano"] },
        { naam: "Kunstmatige Zoetstoffen", trefwoorden: ["sucralose", "asparta", "sacharine", "acesulfaam", "neotaam", "erythritol", "xylitol", "sorbitol", "maltitol"] }
    ];

    cameraInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            // Vernietig een eventuele oude cropper-sessie
            if (cropper) { cropper.destroy(); }
            
            imageToCrop.src = event.target.result;
            imgContainer.style.display = 'block';
            cropButton.style.display = 'block';
            resultDiv.style.display = 'none';

            // Start de fotocropper (vrij bewegen zonder vaste verhoudingen)
            cropper = new Cropper(imageToCrop, {
                viewMode: 1,
                autoCropArea: 1,
                movable: true,
                zoomable: true,
                rotatable: false,
                scalable: false
            });
        }
        reader.readAsDataURL(file);
    });

    // Zodra je op de "Uitsnijden & Scannen" knop drukt
    cropButton.addEventListener('click', () => {
        if (!cropper) return;

        // Haal de uitgesneden afbeelding op in hoge kwaliteit
        const canvas = cropper.getCroppedCanvas({ maxWidth: 2048, maxHeight: 2048 });
        
        imgContainer.style.display = 'none';
        cropButton.style.display = 'none';
        resultDiv.className = 'loading';
        resultDiv.style.display = 'block';
        resultDiv.innerText = "Tekst uit je uitsnede aan het lezen (OCR)...";

        // Zet het canvas om naar een bestand waar Tesseract mee kan werken
        canvas.toBlob((blob) => {
            analyzeLabel(blob);
        }, 'image/jpeg', 0.95);
    });

    async function analyzeLabel(blobFile) {
        try {
            const result = await Tesseract.recognize(blobFile, 'nld+eng', {
                logger: m => {
                    if (m.status === 'recognizing text') {
                        resultDiv.innerText = `Scannen: ${Math.round(m.progress * 100)}%`;
                    }
                }
            });

            const gevondenTekst = result.data.text.toLowerCase();
            checkAllergenen(gevondenTekst);

        } catch (error) {
            resultDiv.className = 'danger';
            resultDiv.innerText = "Fout bij het lokaal scannen: " + error.message;
        }
    }

    function checkAllergenen(tekst) {
        let gevondenAllergenen = [];

        // 1. Maak de tekst helemaal schoon
        let opgeschoondeTekst = tekst
            .replaceAll("(", " ")
            .replaceAll(")", " ")
            .replaceAll(",", " ")
            .replaceAll(".", " ")
            .replaceAll(":", " ")
            .replaceAll(";", " ")
            .replaceAll("\n", " ");

        // 2. Jouw veilige uitzonderingen
        const veiligeWoorden = [
            "sojalecithine", "sojalecitine", "soy lecithin", 
            "melkvet", "milk fat", "watervrij melkvet", "milkfat",
            "melkcomponenten", "milk components", "milk solids", "butterfat"
        ];
        
        veiligeWoorden.forEach(veiligWoord => {
            opgeschoondeTekst = opgeschoondeTekst.replaceAll(veiligWoord, "[veilig]");
        });

        // 3. Controleer op de echte allergenen
        ALLERGENEN.forEach(allergeen => {
            let triggers = allergeen.trefwoorden.filter(woord => {
                return opgeschoondeTekst.split(" ").includes(woord);
            });

            if (triggers.length > 0) {
                gevondenAllergenen.push(`${allergeen.naam} (omdat we vonden: "${triggers.join(', ')}")`);
            }
        });

        // 4. Resultaat tonen
        if (gevondenAllergenen.length > 0) {
            resultDiv.className = "danger";
            resultDiv.innerText = "VERDICT: GEVAAR\n\nPas op! De volgende ingrediënten zijn ontdekt:\n• " + gevondenAllergenen.join("\n• ");
        } else {
            resultDiv.className = "safe";
            resultDiv.innerText = "VERDICT: VEILIG\n\nGeen van jouw allergenen zijn direct teruggevonden op het label.\n(Veilige ingrediënten zoals sojalecithine en melkvet zijn perfect genegeerd).";
        }
    }
</script>

</body>
</html>
